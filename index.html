<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quotation Dashboard — YUSHIN</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F4F7;--sur:#fff;--sur2:#F3F4F6;
  --blue:#1A56A0;--bl:#EBF2FB;
  --green:#0B6E4F;--gl:#E3F5EC;
  --ora:#C4600A;--ol:#FEF0E6;
  --red:#B91C1C;--rl:#FEE2E2;
  --txt:#1C1C1E;--mut:#6B7280;--bdr:#E5E7EB;
  --r:8px;--rl2:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:14px}

/* HEADER */
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.brand{display:flex;align-items:center;gap:10px}
.bmark{width:32px;height:32px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;letter-spacing:-.5px}
.bname{font-size:14px;font-weight:600;color:var(--txt)}
.bsub{font-size:10px;color:var(--mut)}
.hact{display:flex;gap:8px;align-items:center}
.btn{padding:6px 12px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--sur);color:var(--txt);font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--sur2)}
.btnp{background:var(--blue);color:#fff;border-color:var(--blue)}
.btnp:hover{background:#1447a0}

/* UPLOAD */
.upsec{background:var(--sur);border-bottom:1px solid var(--bdr);padding:16px 20px}
.upzone{border:2px dashed var(--bdr);border-radius:var(--rl2);padding:18px 20px;text-align:center;transition:.2s;cursor:pointer;position:relative}
.upzone:hover,.upzone.drag{border-color:var(--blue);background:var(--bl)}
.upzone label{cursor:pointer;color:var(--mut);font-size:13px;display:block}
.upzone label b{color:var(--blue)}
.upzone input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.slots{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px}
@media(max-width:820px){.slots{grid-template-columns:repeat(3,1fr)}}
.slot{border:1.5px dashed var(--bdr);border-radius:10px;padding:10px 6px;text-align:center;min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.slot.ok{border-style:solid}
.sbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sname{font-size:10px;color:var(--mut);line-height:1.3;text-align:center}
.scount{font-size:11px;font-weight:600}

/* TABS */
.tabs{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;overflow-x:auto}
.tab{padding:11px 14px;font-size:12px;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:.15s}
.tab:hover{color:var(--txt)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.tbadge{font-size:10px;background:var(--sur2);color:var(--mut);padding:1px 6px;border-radius:20px}
.tab.on .tbadge{background:var(--bl);color:var(--blue)}

/* MAIN */
.main{padding:20px;max-width:1400px;margin:0 auto}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:18px}
.kcard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl2);padding:14px 16px}
.klbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.kval{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.ksub{font-size:10px;color:var(--mut);margin-top:2px}

/* CHARTS */
.crow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:680px){.crow{grid-template-columns:1fr}}
.ccard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl2);padding:14px 16px}
.ctitle{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}

/* TYPE OVERVIEW CARDS */
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:10px;margin-bottom:18px}
.tcard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl2);padding:13px 15px;cursor:pointer;transition:.15s}
.tcard:hover:not(.empty){box-shadow:0 0 0 3px var(--bl);border-color:var(--blue)}
.tcard.empty{opacity:.38;cursor:default}
.tchead{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.tbig{font-size:21px;font-weight:700}
.tbar{height:3px;background:var(--bdr);border-radius:2px;margin-top:9px;overflow:hidden}
.tbarf{height:3px;border-radius:2px;transition:width .5s}

/* TABLE */
.tblcard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl2);overflow:hidden}
.tbltb{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.srch{padding:6px 10px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;background:var(--sur);color:var(--txt);width:200px}
.srch:focus{outline:none;border-color:var(--blue)}
.fsel{padding:5px 8px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;background:var(--sur);color:var(--txt);cursor:pointer}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--sur2);padding:8px 11px;text-align:left;font-weight:600;color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--blue)}
th.srt{color:var(--blue)}
td{padding:8px 11px;border-bottom:1px solid var(--bdr);color:var(--txt)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bl)}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;gap:3px}
.badge-sent{background:var(--gl);color:var(--green)}
.badge-pend{background:var(--sur2);color:var(--mut)}
.badge-cancel{background:var(--rl);color:var(--red)}
.badge-check{background:#EDE9FE;color:#5B21B6}
.pgn{display:flex;align-items:center;gap:5px;padding:10px 14px;border-top:1px solid var(--bdr);justify-content:flex-end;flex-wrap:wrap}
.pbtn{padding:4px 9px;border:1px solid var(--bdr);border-radius:6px;font-size:11px;cursor:pointer;background:var(--sur);color:var(--txt)}
.pbtn:hover{background:var(--sur2)}
.pbtn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.pinfo{font-size:11px;color:var(--mut)}
.drpill{font-size:11px;background:var(--bl);color:var(--blue);padding:3px 10px;border-radius:20px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:4px}
.empty{text-align:center;padding:52px 20px;color:var(--mut)}
.eico{font-size:34px;margin-bottom:10px;opacity:.25}
@media print{
  .hact,.upsec,.tabs .tab:not(.on),.tbltb,.pgn{display:none!important}
  .main{padding:0}
  body{background:#fff}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">
    <div class="bmark">YS</div>
    <div>
      <div class="bname">Quotation Dashboard</div>
      <div class="bsub">YUSHIN PRECISION EQUIPMENT (THAILAND)</div>
    </div>
  </div>
  <div class="hact">
    <span id="mlbl" style="font-size:11px;color:var(--mut);background:var(--sur2);padding:3px 10px;border-radius:20px;border:1px solid var(--bdr)">ยังไม่ได้โหลดไฟล์</span>
    <button class="btn btnp" onclick="window.print()">🖨 พิมพ์/PDF</button>
  </div>
</div>

<div class="upsec">
  <div class="upzone" id="dz">
    <label>
      📂 <b>คลิกเลือกไฟล์ Excel</b> หรือลากมาวางที่นี่ — เลือกได้หลายไฟล์พร้อมกัน (.xlsx)
      <input type="file" id="fi" multiple accept=".xlsx,.xls" onchange="handleFiles(this.files)">
    </label>
  </div>
  <div class="slots" id="slots"></div>
</div>

<div class="tabs" id="tabbar"></div>
<div class="main" id="mc">
  <div class="empty"><div class="eico">📊</div>
    <div style="font-size:14px;font-weight:600;color:var(--txt);margin-bottom:6px">เริ่มต้นด้วยการอัปโหลดไฟล์ Excel</div>
    <div style="font-size:12px">รองรับ: Quotation Request · After Service · After PM · PM · Training · Program</div>
  </div>
</div>

<script>
/* ── TYPE CONFIG ─────────────────────────── */
const TC=[
  {k:'QR', lb:'Quotation Request', sh:'QR',  c:'#1A56A0',bg:'#EBF2FB',tc:'#1A56A0'},
  {k:'AS', lb:'After Service',     sh:'AS',  c:'#0B6E4F',bg:'#E3F5EC',tc:'#0B6E4F'},
  {k:'APM',lb:'After PM',          sh:'APM', c:'#6D28D9',bg:'#EDE9FE',tc:'#5B21B6'},
  {k:'PM', lb:'PM',                sh:'PM',  c:'#C4600A',bg:'#FEF0E6',tc:'#9A3E00'},
  {k:'TR', lb:'Training',          sh:'TR',  c:'#0284C7',bg:'#E0F2FE',tc:'#0369A1'},
  {k:'PG', lb:'Program',           sh:'PG',  c:'#BE185D',bg:'#FCE7F3',tc:'#9D174D'},
];
const PCOLS=['#1A56A0','#0B6E4F','#C4600A','#6D28D9','#B91C1C','#0284C7','#BE185D','#78350F','#065F46','#374151'];

/* ── STATE ───────────────────────────────── */
let DATA={}, ATAB='overview', DRILL=null, SQ='', FST='all', FPR='all', SCOL=null, SASC=true, PAGE=1;
const PS=30;
let charts={};

/* ── STATUS CLASSIFICATION ───────────────── */
// sent = ส่งทำใบเสนอราคา (and variants)
// cancel = ยกเลิก
// pending = blank / other
function classifyStatus(v){
  if(!v || v.toString().trim()==='') return 'pending';
  const s = v.toString().trim();
  if(/ส่งทำใบเสนอ|ส่งใบเสนอ/.test(s)) return 'sent';
  if(/ยกเลิก/.test(s)) return 'cancel';
  return 'pending';
}

/* ── FILE PARSING ────────────────────────── */
function getCell(ws, r, c){
  const cell = ws[XLSX.utils.encode_cell({r, c})];
  if(!cell || cell.v === undefined) return '';
  return cell.v;
}

function findColIdx(hdrs, keywords){
  for(const kw of keywords){
    const i = hdrs.findIndex(h => h && h.toString().includes(kw));
    if(i >= 0) return i;
  }
  return -1;
}

function parseWS(ws, fname){
  if(!ws || !ws['!ref']) return [];
  const rng = XLSX.utils.decode_range(ws['!ref']);

  // Find header row: row containing "ทำใบเสนอโดย"
  let hrow = -1;
  for(let r = rng.s.r; r <= Math.min(rng.s.r+12, rng.e.r); r++){
    for(let c = rng.s.c; c <= rng.e.c; c++){
      const v = getCell(ws, r, c);
      if(v && v.toString().includes('ทำใบเสนอโดย')){ hrow = r; break; }
    }
    if(hrow >= 0) break;
  }
  if(hrow < 0){ console.warn('No header found:', fname); return []; }

  // Read headers
  const hdrs = [];
  for(let c = rng.s.c; c <= rng.e.c; c++) hdrs.push(getCell(ws, hrow, c));

  // Map columns by keyword
  const ci = {
    maker:   findColIdx(hdrs, ['ทำใบเสนอโดย']),
    customer:findColIdx(hdrs, ['ลูกค้า']),
    appst:   findColIdx(hdrs, ['สถานะการอนุมัติ']),
    amount:  findColIdx(hdrs, ['ยอดรวมราคา']),
    quoteno: findColIdx(hdrs, ['ใบเสนอราคาเลขที่']),
    date:    findColIdx(hdrs, ['วันที่']),
    seq:     findColIdx(hdrs, ['ลำดับ']),
  };

  console.log(fname, '| hrow:', hrow, '| ci:', ci);

  const rows = [];
  // Skip hrow+1 if it's a sub-header (e.g. "ต้องแจ้ง / ไม่แจ้ง" row, "No." row)
  let startRow = hrow + 1;
  {
    // Check if row hrow+1 is sub-header: maker cell is blank
    const testMaker = ci.maker >= 0 ? getCell(ws, startRow, ci.maker) : '';
    if(!testMaker || testMaker.toString().trim() === '' || /ต้องแจ้ง|ไม่แจ้ง|No\.|^No$/.test(testMaker.toString())){
      startRow = hrow + 2;
    }
  }

  for(let r = startRow; r <= rng.e.r; r++){
    if(ci.maker < 0) break;
    let maker = getCell(ws, r, ci.maker);
    if(!maker || maker.toString().trim() === '') continue;
    maker = maker.toString().trim();
    // Skip rows that are clearly sub-headers
    if(/ต้องแจ้ง|ไม่แจ้ง|^หัวข้อ/.test(maker)) continue;

    const appst  = ci.appst  >= 0 ? getCell(ws, r, ci.appst)  : '';
    const amt    = ci.amount >= 0 ? (parseFloat(getCell(ws, r, ci.amount)) || 0) : 0;
    const qno    = ci.quoteno>= 0 ? getCell(ws, r, ci.quoteno): '';
    const cust   = ci.customer>=0 ? getCell(ws, r, ci.customer): '';
    const seq    = ci.seq    >= 0 ? getCell(ws, r, ci.seq)    : r - startRow + 1;

    // Date: convert Excel serial if numeric
    let dateStr = '';
    const rawDate = ci.date >= 0 ? getCell(ws, r, ci.date) : '';
    if(rawDate){
      if(typeof rawDate === 'number' && rawDate > 1){
        const d = new Date(Math.round((rawDate - 25569) * 86400000));
        dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
      } else { dateStr = rawDate.toString(); }
    }

    const status = classifyStatus(appst);

    rows.push({
      seq: seq.toString(),
      date: dateStr,
      maker,
      customer: cust ? cust.toString().replace(/\n/g,' ') : '',
      appst: appst ? appst.toString() : '',
      qno: qno ? qno.toString().replace(/^No\.?$/, '') : '',
      amt,
      status,
    });
  }
  console.log('Parsed', rows.length, 'rows from', fname);
  return rows;
}

function detectType(name){
  const n = name.toLowerCase();
  if(/after.?service|after_service|_as[\._]/i.test(n)) return 'AS';
  if(/after.?pm|after_pm|_apm/i.test(n)) return 'APM';
  if(/training|_tr[\._]/i.test(n)) return 'TR';
  if(/program|_pg[\._]/i.test(n)) return 'PG';
  if(/\bpm\b|_pm[\._]/i.test(n) && !/after/i.test(n)) return 'PM';
  return 'QR';
}

/* ── DRAG-DROP ───────────────────────────── */
const dz = document.getElementById('dz');
dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag'));
dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('drag'); handleFiles(e.dataTransfer.files); });

function handleFiles(files){
  if(!files || !files.length) return;
  Array.from(files).forEach(f => {
    if(!/\.(xlsx|xls)$/i.test(f.name)){ alert('ไม่รองรับ: '+f.name); return; }
    const reader = new FileReader();
    reader.onerror = ()=> alert('อ่านไฟล์ไม่ได้: '+f.name);
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = parseWS(ws, f.name);
        if(!rows.length){ alert('ไม่พบข้อมูลในไฟล์: '+f.name+'\nกรุณาตรวจสอบว่าไฟล์มีหัวข้อ "ทำใบเสนอโดย"'); return; }
        const type = detectType(f.name);
        if(!DATA[type]) DATA[type]={rows:[],files:[]};
        DATA[type].rows = [...DATA[type].rows, ...rows];
        DATA[type].files.push(f.name);
        updateUI();
      } catch(err){ alert('เกิดข้อผิดพลาด: '+f.name+'\n'+err.message); }
    };
    reader.readAsArrayBuffer(f);
  });
}

/* ── HELPERS ─────────────────────────────── */
function allRows(){ return Object.values(DATA).flatMap(d=>d.rows); }

function calcStats(rows){
  const tot = rows.length;
  const sent = rows.filter(r=>r.status==='sent').length;
  const cancel = rows.filter(r=>r.status==='cancel').length;
  const pending = tot - sent - cancel;
  const amt = rows.filter(r=>r.status==='sent').reduce((s,r)=>s+r.amt, 0);
  const rate = tot > 0 ? Math.round(sent/tot*100) : 0;
  const makers = {};
  rows.forEach(r=>{
    if(!makers[r.maker]) makers[r.maker]={t:0,s:0,c:0,a:0};
    makers[r.maker].t++;
    if(r.status==='sent'){ makers[r.maker].s++; makers[r.maker].a+=r.amt; }
    if(r.status==='cancel') makers[r.maker].c++;
  });
  return {tot, sent, cancel, pending, amt, rate, makers};
}

const fmt  = n => Math.round(n).toLocaleString('th-TH');
const fmtK = v => v>=1e6?(v/1e6).toFixed(1)+'M': v>=1000?(v/1000).toFixed(0)+'K': v.toString();

/* ── UI UPDATE ───────────────────────────── */
function updateUI(){
  document.getElementById('mlbl').textContent = '📁 ข้อมูล '+allRows().length.toLocaleString()+' รายการ';
  renderSlots(); renderTabs(); renderContent();
}

function renderSlots(){
  document.getElementById('slots').innerHTML = TC.map(t=>{
    const d=DATA[t.k], ok=d&&d.rows.length>0;
    return `<div class="slot ${ok?'ok':''}" style="${ok?'border-color:'+t.c+';background:'+t.bg:''}">
      <span class="sbadge" style="background:${t.bg};color:${t.tc}">${t.sh}</span>
      <span class="sname">${t.lb}</span>
      ${ok ? `<span class="scount" style="color:${t.c}">✓ ${d.rows.length} รายการ</span>` : '<span style="font-size:16px;color:var(--bdr)">+</span>'}
    </div>`;
  }).join('');
}

function renderTabs(){
  const ar = allRows();
  const tabs = [
    {k:'overview', lb:'📊 ภาพรวมทั้งหมด', cnt:ar.length},
    ...TC.map(t=>({
      k:t.k,
      lb:`<span style="background:${t.bg};color:${t.tc};padding:1px 6px;border-radius:9px;font-size:10px;font-weight:700;margin-right:3px">${t.sh}</span>${t.lb}`,
      cnt: DATA[t.k]?DATA[t.k].rows.length:0
    }))
  ];
  document.getElementById('tabbar').innerHTML = tabs.map(t=>
    `<div class="tab ${ATAB===t.k?'on':''}" onclick="switchTab('${t.k}')">
      ${t.lb}<span class="tbadge">${t.cnt.toLocaleString()}</span>
    </div>`
  ).join('');
}

function switchTab(k){ ATAB=k; DRILL=null; SQ=''; FST='all'; FPR='all'; PAGE=1; SCOL=null; renderTabs(); renderContent(); }

/* ── RENDER CONTENT ──────────────────────── */
function destroyCharts(){ Object.values(charts).forEach(c=>{ try{c.destroy()}catch(e){} }); charts={}; }

function renderContent(){
  destroyCharts();
  const el = document.getElementById('mc');
  if(ATAB==='overview'){
    const ar = allRows();
    if(!ar.length){ el.innerHTML='<div class="empty"><div class="eico">📊</div><div style="font-size:13px;font-weight:600;color:var(--txt)">อัปโหลดไฟล์ Excel เพื่อเริ่มต้น</div></div>'; return; }
    el.innerHTML = renderOverview(ar);
  } else {
    const cfg=TC.find(t=>t.k===ATAB), d=DATA[ATAB];
    if(!d||!d.rows.length){
      el.innerHTML=`<div class="empty"><div class="eico" style="color:${cfg.c}">📁</div>
        <div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:5px">ยังไม่มีข้อมูล ${cfg.lb}</div>
        <div style="font-size:12px">อัปโหลดไฟล์ Excel สำหรับประเภทนี้</div></div>`;
      return;
    }
    el.innerHTML = renderTypeView(cfg, d.rows);
  }
  setTimeout(initCharts, 60);
}

/* ── KPI HTML ────────────────────────────── */
function kpiHtml(s){
  const rc = s.rate>=70?'var(--green)': s.rate>=40?'var(--ora)': 'var(--red)';
  return `<div class="kgrid">
    <div class="kcard"><div class="klbl">📄 รายการทั้งหมด</div><div class="kval">${s.tot.toLocaleString()}</div><div class="ksub">ใบเสนอราคา</div></div>
    <div class="kcard"><div class="klbl">✅ ส่งแล้ว</div><div class="kval" style="color:var(--green)">${s.sent.toLocaleString()}</div><div class="ksub">สถานะ "ส่งทำใบเสนอราคา"</div></div>
    <div class="kcard"><div class="klbl">⏳ รอดำเนินการ</div><div class="kval" style="color:var(--ora)">${s.pending.toLocaleString()}</div><div class="ksub">ยังไม่มีสถานะ</div></div>
    <div class="kcard"><div class="klbl">❌ ยกเลิก</div><div class="kval" style="color:var(--red)">${s.cancel.toLocaleString()}</div><div class="ksub">ยกเลิกใบเสนอราคา</div></div>
    <div class="kcard"><div class="klbl">💰 ยอดรวม (฿)</div><div class="kval" style="font-size:18px;color:var(--blue)">${fmt(s.amt)}</div><div class="ksub">เฉพาะที่ส่งแล้ว</div></div>
    <div class="kcard"><div class="klbl">📈 อัตราส่ง</div><div class="kval" style="color:${rc}">${s.rate}%</div><div class="ksub">sent / total</div></div>
  </div>`;
}

/* ── OVERVIEW ────────────────────────────── */
function renderOverview(ar){
  const s = calcStats(ar);
  const typecards = TC.map(t=>{
    const d=DATA[t.k], ts=d?calcStats(d.rows):{tot:0,sent:0,cancel:0,pending:0,amt:0,rate:0};
    const empty = ts.tot===0;
    const rc = ts.rate>=70?t.c: ts.rate>=40?'var(--ora)': 'var(--mut)';
    return `<div class="tcard ${empty?'empty':''}" ${empty?'':'onclick="switchTab(\''+t.k+'\')"'}>
      <div class="tchead">
        <span class="sbadge" style="background:${t.bg};color:${t.tc}">${t.sh}</span>
        <span style="font-size:11px;color:var(--mut)">${t.lb}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span class="tbig">${ts.tot.toLocaleString()}</span>
        <span style="font-size:12px;font-weight:600;color:${rc}">${ts.rate}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:3px">
        <span style="font-size:10px;color:var(--green)">✓ ส่ง ${ts.sent}</span>
        <span style="font-size:10px;color:var(--red)">✕ ยกเลิก ${ts.cancel}</span>
        <span style="font-size:10px;color:var(--mut)">${fmt(ts.amt)} ฿</span>
      </div>
      <div class="tbar"><div class="tbarf" style="background:${t.c};width:${ts.rate}%"></div></div>
    </div>`;
  }).join('');

  const me = Object.entries(s.makers).sort((a,b)=>b[1].t-a[1].t);
  const mh = Math.max(me.length*46+60, 200);

  return `${kpiHtml(s)}
  <div style="font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">สรุปแยกตามประเภท <span style="font-weight:400;text-transform:none">(คลิกดูรายละเอียด)</span></div>
  <div class="tgrid">${typecards}</div>
  <div class="crow">
    <div class="ccard">
      <div class="ctitle">จำนวนรายการแยกตามคน</div>
      <div style="position:relative;height:${mh}px"><canvas id="c1"></canvas></div>
    </div>
    <div class="ccard">
      <div class="ctitle">ยอดรวม (฿) แยกตามคน</div>
      <div style="position:relative;height:${mh}px"><canvas id="c2"></canvas></div>
    </div>
  </div>
  <div class="crow">
    <div class="ccard">
      <div class="ctitle">อัตราส่ง (%) แยกตามคน <span style="font-size:10px;font-weight:400;color:var(--mut)">🟢≥70% 🟡≥40% 🔴<40%</span></div>
      <div style="position:relative;height:${mh}px"><canvas id="c3"></canvas></div>
    </div>
    <div class="ccard">
      <div class="ctitle">สัดส่วนจำนวนแยกตามประเภท</div>
      <div style="position:relative;height:240px"><canvas id="c4"></canvas></div>
    </div>
  </div>`;
}

/* ── TYPE VIEW ───────────────────────────── */
function renderTypeView(cfg, rows){
  const s = calcStats(rows);
  const fr = filteredRows(rows);
  const me = Object.entries(s.makers).sort((a,b)=>b[1].t-a[1].t);
  const mh = Math.max(me.length*46+60, 200);
  return `${kpiHtml(s)}
  <div class="crow">
    <div class="ccard">
      <div class="ctitle">จำนวนแยกตามคน <span style="font-size:10px;font-weight:400;color:var(--mut)">(คลิกแท่งเพื่อกรองตาราง)</span></div>
      <div style="position:relative;height:${mh}px"><canvas id="ct1"></canvas></div>
    </div>
    <div class="ccard">
      <div class="ctitle">ยอดรวม (฿) แยกตามคน</div>
      <div style="position:relative;height:${mh}px"><canvas id="ct2"></canvas></div>
    </div>
  </div>
  ${renderTable(fr, cfg)}`;
}

/* ── TABLE ───────────────────────────────── */
function filteredRows(rows){
  let r = [...rows];
  if(DRILL) r = r.filter(x=>x.maker===DRILL);
  if(FST!=='all') r = r.filter(x=>x.status===FST);
  if(FPR!=='all') r = r.filter(x=>x.maker===FPR);
  if(SQ){
    const q=SQ.toLowerCase();
    r=r.filter(x=>[x.seq,x.customer,x.maker,x.qno,x.appst].some(v=>v&&v.toString().toLowerCase().includes(q)));
  }
  if(SCOL){
    r.sort((a,b)=>{
      let va=a[SCOL],vb=b[SCOL];
      if(SCOL==='amt'){va=Number(va)||0;vb=Number(vb)||0;return SASC?va-vb:vb-va;}
      va=(va||'').toString(); vb=(vb||'').toString();
      return SASC?va.localeCompare(vb,'th'):vb.localeCompare(va,'th');
    });
  }
  return r;
}

function statusBadge(s){
  if(s==='sent')   return '<span class="badge badge-sent">✓ ส่งแล้ว</span>';
  if(s==='cancel') return '<span class="badge badge-cancel">✕ ยกเลิก</span>';
  return '<span class="badge badge-pend">● รอ</span>';
}

function renderTable(rows, cfg){
  const srcRows = cfg ? (DATA[cfg.k]?DATA[cfg.k].rows:[]) : allRows();
  const mkrs = [...new Set(srcRows.map(r=>r.maker).filter(Boolean))].sort();
  const st=(PAGE-1)*PS, pr=rows.slice(st,st+PS), tp=Math.ceil(rows.length/PS);

  const cols=[
    {k:'seq',l:'ลำดับ'},{k:'date',l:'วันที่'},{k:'maker',l:'ผู้ทำ'},
    {k:'customer',l:'ลูกค้า'},{k:'appst',l:'สถานะการอนุมัติ'},
    {k:'qno',l:'เลขที่ใบเสนอ'},{k:'amt',l:'ยอดรวมราคา (฿)'},{k:'status',l:'สถานะ'}
  ];

  let pgn='';
  if(tp>1){
    pgn=`<div class="pgn"><span class="pinfo">แสดง ${st+1}–${Math.min(st+PS,rows.length)} จาก ${rows.length.toLocaleString()} รายการ</span>`;
    if(PAGE>1) pgn+=`<button class="pbtn" onclick="goPage(${PAGE-1})">←</button>`;
    const s2=Math.max(1,PAGE-2), e2=Math.min(tp,s2+4);
    for(let p=s2;p<=e2;p++) pgn+=`<button class="pbtn ${p===PAGE?'on':''}" onclick="goPage(${p})">${p}</button>`;
    if(PAGE<tp) pgn+=`<button class="pbtn" onclick="goPage(${PAGE+1})">→</button>`;
    pgn+='</div>';
  }

  return `<div class="tblcard">
    <div class="tbltb">
      ${DRILL?`<button class="drpill" onclick="clearDrill()">👤 ${DRILL} ×</button>`:''}
      <input class="srch" placeholder="🔍 ค้นหาลูกค้า / ผู้ทำ / เลขที่..." value="${SQ}" oninput="doSearch(this.value)">
      <select class="fsel" onchange="doFST(this.value)">
        <option value="all" ${FST==='all'?'selected':''}>ทุกสถานะ</option>
        <option value="sent"   ${FST==='sent'?'selected':''}>✓ ส่งแล้ว</option>
        <option value="pending"${FST==='pending'?'selected':''}>● รอดำเนินการ</option>
        <option value="cancel" ${FST==='cancel'?'selected':''}>✕ ยกเลิก</option>
      </select>
      <select class="fsel" onchange="doFPR(this.value)">
        <option value="all">ทุกคน</option>
        ${mkrs.map(m=>`<option value="${m}" ${FPR===m?'selected':''}>${m.replace(/^(Mr\.|Mrs\.|Ms\.)\s*/,'')}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:var(--mut);margin-left:auto">${rows.length.toLocaleString()} รายการ</span>
    </div>
    <div class="twrap"><table>
      <thead><tr>${cols.map(c=>`<th onclick="doSort('${c.k}')" class="${SCOL===c.k?'srt':''}">${c.l} ${SCOL===c.k?(SASC?'↑':'↓'):'↕'}</th>`).join('')}</tr></thead>
      <tbody>${pr.length===0
        ? `<tr><td colspan="${cols.length}" style="text-align:center;padding:28px;color:var(--mut)">ไม่พบรายการ</td></tr>`
        : pr.map(r=>`<tr>
          <td style="color:var(--mut)">${r.seq}</td>
          <td style="color:var(--mut)">${r.date}</td>
          <td style="font-weight:500">${r.maker}</td>
          <td>${r.customer||'—'}</td>
          <td style="font-size:11px;color:var(--mut)">${r.appst||'—'}</td>
          <td style="font-family:monospace;font-size:11px;color:var(--blue)">${r.qno||'—'}</td>
          <td style="text-align:right;font-variant-numeric:tabular-nums">${r.amt?fmt(r.amt):'—'}</td>
          <td>${statusBadge(r.status)}</td>
        </tr>`).join('')
      }</tbody>
    </table></div>
    ${pgn}
  </div>`;
}

function rerenderTable(){
  const rows = ATAB==='overview' ? allRows() : (DATA[ATAB]?DATA[ATAB].rows:[]);
  const cfg  = ATAB!=='overview' ? TC.find(t=>t.k===ATAB) : null;
  const fr   = filteredRows(rows);
  const el   = document.querySelector('.tblcard');
  if(el){ const tmp=document.createElement('div'); tmp.innerHTML=renderTable(fr,cfg); el.replaceWith(tmp.firstChild); }
}

function doSearch(v){ SQ=v; PAGE=1; rerenderTable(); }
function doFST(v)   { FST=v; PAGE=1; rerenderTable(); }
function doFPR(v)   { FPR=v; PAGE=1; rerenderTable(); }
function doSort(c)  { if(SCOL===c)SASC=!SASC; else{SCOL=c;SASC=true;} PAGE=1; rerenderTable(); }
function goPage(p)  { PAGE=p; rerenderTable(); }
function clearDrill(){ DRILL=null; FPR='all'; PAGE=1; rerenderTable(); }

/* ── CHARTS ──────────────────────────────── */
function hbarOpts(tickFn){
  return {
    indexAxis:'y', responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10},callback:tickFn||undefined}},
      y:{grid:{display:false},ticks:{font:{size:11}}}
    }
  };
}

function shortName(n){ return n.replace(/^(Mr\.|Mrs\.|Ms\.)\s*/,''); }

function initCharts(){
  if(ATAB==='overview'){
    const ar=allRows(); if(!ar.length) return;
    const s=calcStats(ar);
    const me=Object.entries(s.makers).sort((a,b)=>b[1].t-a[1].t);
    const labs=me.map(([n])=>shortName(n));
    const tots=me.map(([,v])=>v.t), sents=me.map(([,v])=>v.s), cancels=me.map(([,v])=>v.c);
    const amts=me.map(([,v])=>v.a);
    const rates=me.map(([,v])=>v.t>0?Math.round(v.s/v.t*100):0);

    charts.c1=new Chart(document.getElementById('c1'),{
      type:'bar',
      data:{labels:labs,datasets:[
        {label:'ทั้งหมด',data:tots,backgroundColor:'#1A56A0cc',borderRadius:3},
        {label:'ส่งแล้ว',data:sents,backgroundColor:'#0B6E4Fcc',borderRadius:3},
        {label:'ยกเลิก',data:cancels,backgroundColor:'#B91C1Ccc',borderRadius:3},
      ]},
      options:{...hbarOpts(),plugins:{legend:{display:true,position:'top',labels:{font:{size:10},boxWidth:10}}}}
    });

    charts.c2=new Chart(document.getElementById('c2'),{
      type:'bar',
      data:{labels:labs,datasets:[{data:amts,backgroundColor:labs.map((_,i)=>PCOLS[i%PCOLS.length]),borderRadius:3}]},
      options:{...hbarOpts(fmtK),scales:{x:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10},callback:fmtK}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
    });

    charts.c3=new Chart(document.getElementById('c3'),{
      type:'bar',
      data:{labels:labs,datasets:[{data:rates,backgroundColor:rates.map(r=>r>=70?'#0B6E4F':r>=40?'#C4600A':'#B91C1C'),borderRadius:3}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{max:110,grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10},callback:v=>v+'%'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
    });

    const tl=TC.map(t=>t.sh), tc2=TC.map(t=>DATA[t.k]?DATA[t.k].rows.length:0), tcol=TC.map(t=>t.c);
    charts.c4=new Chart(document.getElementById('c4'),{
      type:'doughnut',
      data:{labels:tl,datasets:[{data:tc2,backgroundColor:tcol,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{font:{size:11},padding:10}}}}
    });

  } else {
    const d=DATA[ATAB]; if(!d||!d.rows.length) return;
    const s=calcStats(d.rows), cfg=TC.find(t=>t.k===ATAB);
    const me=Object.entries(s.makers).sort((a,b)=>b[1].t-a[1].t);
    const labs=me.map(([n])=>shortName(n)), onames=me.map(([n])=>n);
    const tots=me.map(([,v])=>v.t), sents=me.map(([,v])=>v.s);
    const amts=me.map(([,v])=>v.a);

    charts.ct1=new Chart(document.getElementById('ct1'),{
      type:'bar',
      data:{labels:labs,datasets:[
        {label:'ทั้งหมด',data:tots,backgroundColor:cfg.c+'99',borderRadius:3},
        {label:'ส่งแล้ว',data:sents,backgroundColor:'#0B6E4Fcc',borderRadius:3},
      ]},
      options:{...hbarOpts(),
        onClick:(evt,els)=>{ if(els.length){ DRILL=onames[els[0].index]; FPR='all'; PAGE=1; rerenderTable(); } },
        plugins:{legend:{display:true,position:'top',labels:{font:{size:10},boxWidth:10}}}
      }
    });

    charts.ct2=new Chart(document.getElementById('ct2'),{
      type:'bar',
      data:{labels:labs,datasets:[{data:amts,backgroundColor:labs.map((_,i)=>PCOLS[i%PCOLS.length]),borderRadius:3}]},
      options:{...hbarOpts(fmtK),scales:{x:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10},callback:fmtK}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
    });
  }
}

/* ── INIT ────────────────────────────────── */
renderSlots(); renderTabs();
</script>
</body>
</html>
